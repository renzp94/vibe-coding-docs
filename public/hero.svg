<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- 渐变定义 -->
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0071E3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00C6FF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5856D6;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#0071E3;stop-opacity:0.1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 背景圆形 -->
  <circle cx="200" cy="200" r="150" fill="url(#grad2)" />

  <!-- 外圈装饰 -->
  <circle cx="200" cy="200" r="140" fill="none" stroke="url(#grad1)" stroke-width="2" opacity="0.3"/>
  <circle cx="200" cy="200" r="120" fill="none" stroke="url(#grad1)" stroke-width="1" opacity="0.2"/>

  <!-- 代码编辑器窗口 -->
  <rect x="100" y="120" width="200" height="140" rx="12" fill="#1a1a2e" stroke="#0071E3" stroke-width="2"/>

  <!-- 窗口标题栏 -->
  <rect x="100" y="120" width="200" height="24" rx="12" fill="#252542"/>
  <rect x="100" y="132" width="200" height="12" fill="#252542"/>

  <!-- 窗口按钮 -->
  <circle cx="114" cy="132" r="4" fill="#ff5f57"/>
  <circle cx="126" cy="132" r="4" fill="#febc2e"/>
  <circle cx="138" cy="132" r="4" fill="#28c840"/>

  <!-- 代码行 -->
  <rect x="116" y="156" width="80" height="6" rx="3" fill="#0071E3" opacity="0.8"/>
  <rect x="116" y="170" width="120" height="6" rx="3" fill="#5856D6" opacity="0.6"/>
  <rect x="116" y="184" width="100" height="6" rx="3" fill="#00C6FF" opacity="0.7"/>
  <rect x="116" y="198" width="60" height="6" rx="3" fill="#34c759" opacity="0.6"/>
  <rect x="116" y="212" width="140" height="6" rx="3" fill="#0071E3" opacity="0.5"/>

  <!-- AI/大脑图标 -->
  <g transform="translate(260, 160)">
    <!-- 大脑轮廓 -->
    <path d="M20 10 C 5 10, 0 25, 0 35 C 0 50, 10 55, 20 55 C 30 55, 40 50, 40 35 C 40 25, 35 10, 20 10" fill="none" stroke="url(#grad1)" stroke-width="2.5" filter="url(#glow)"/>

    <!-- 神经网络节点 -->
    <circle cx="12" cy="25" r="3" fill="#0071E3"/>
    <circle cx="28" cy="25" r="3" fill="#00C6FF"/>
    <circle cx="8" cy="38" r="3" fill="#5856D6"/>
    <circle cx="20" cy="42" r="3" fill="#0071E3"/>
    <circle cx="32" cy="38" r="3" fill="#00C6FF"/>

    <!-- 连接线 -->
    <line x1="12" y1="25" x2="28" y2="25" stroke="#0071E3" stroke-width="1" opacity="0.5"/>
    <line x1="12" y1="25" x2="8" y2="38" stroke="#0071E3" stroke-width="1" opacity="0.5"/>
    <line x1="28" y1="25" x2="32" y2="38" stroke="#00C6FF" stroke-width="1" opacity="0.5"/>
    <line x1="8" y1="38" x2="20" y2="42" stroke="#5856D6" stroke-width="1" opacity="0.5"/>
    <line x1="20" y1="42" x2="32" y2="38" stroke="#0071E3" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- 流动的连接线（代码到AI） -->
  <path d="M 220 200 Q 240 200, 260 185" fill="none" stroke="url(#grad1)" stroke-width="2" stroke-dasharray="4,4" opacity="0.6">
    <animate attributeName="stroke-dashoffset" values="0;8" dur="1s" repeatCount="indefinite"/>
  </path>

  <!-- 悬浮的代码块装饰 -->
  <rect x="60" y="280" width="50" height="30" rx="6" fill="#252542" opacity="0.6" transform="rotate(-10 85 295)"/>
  <rect x="65" y="285" width="30" height="4" rx="2" fill="#0071E3" opacity="0.5" transform="rotate(-10 80 287)"/>
  <rect x="65" y="292" width="20" height="4" rx="2" fill="#5856D6" opacity="0.4" transform="rotate(-10 75 294)"/>

  <rect x="290" y="270" width="50" height="30" rx="6" fill="#252542" opacity="0.6" transform="rotate(10 315 285)"/>
  <rect x="295" y="275" width="25" height="4" rx="2" fill="#00C6FF" opacity="0.5" transform="rotate(10 307 277)"/>
  <rect x="295" y="282" width="35" height="4" rx="2" fill="#0071E3" opacity="0.4" transform="rotate(10 312 284)"/>

  <!-- 光点装饰 -->
  <circle cx="80" cy="100" r="3" fill="#0071E3" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="320" cy="110" r="2" fill="#00C6FF" opacity="0.5">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="340" cy="240" r="2.5" fill="#5856D6" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.9;0.4" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- 底部光晕 -->
  <ellipse cx="200" cy="350" rx="100" ry="15" fill="url(#grad1)" opacity="0.1"/>
</svg>
